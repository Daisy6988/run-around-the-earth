<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繞著地球跑</title>
    <style>
        body {
            margin: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: url(https://www.lrc999.org/wp-content/uploads/2016/10/unnamed-19.jpg);
            background-size: cover;

        }

        .earth {
            width: 600px;
            height: 600px;
            position: relative;
            border-radius: 100%;

            animation-name: roll-box;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;

            background-image: url(https://t4.ftcdn.net/jpg/08/98/43/11/360_F_898431162_ZOidCG6IdtIOuikcaiayaDeHQWWdiKAX.jpg);
            background-repeat: no-repeat;
            background-size: 180%;
            background-position: center;
            z-index: 5;
        }

        .human {
            background-color: transparent;
            width: calc(310px/3);
            height: calc(310px/3);
            position: absolute;
            left: 50%;
            top: calc(4%/2);
            transform: translate(-50%, -100%) rotateY(-360deg);

            background-image: url(./img/run.gif);
            background-size: 110%;
            background-position: center;
            border-radius: 80%;
            
        }

        @keyframes roll-box {
            0% {
                left: 0;
                top: 0;
                transform: rotate(-360deg);
            
            }
        }
    </style>
</head>

<body>
    <div class="earth">
        <div class="human"></div>
    </div>
</body>

</html>
